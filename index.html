<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concours Double Pro</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .modal-overlay { background-color: rgba(30, 58, 138, 0.4);
        backdrop-filter: blur(3px); }
    </style>
</head>
<body>

    <div id="app" class="max-w-6xl mx-auto p-4 md:p-8"></div>

    <div id="modal-poste" class="hidden fixed inset-0 modal-overlay flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm mx-4 border-t-8 border-blue-600">
            <h3 class="text-xl font-bold mb-2 text-blue-900 uppercase italic">Assigner un poste</h3>
            <p id="modal-fisher-name" class="text-blue-600 font-bold mb-6 text-lg"></p>
            <select id="modal-select-poste" class="w-full border-2 border-slate-100 p-4 
        rounded-2xl mb-6 font-bold outline-none focus:border-blue-600 bg-slate-50 uppercase"></select>
            <div class="flex gap-3">
                <button onclick="closePosteModal()" class="flex-1 bg-slate-100 py-4 rounded-2xl font-bold text-slate-500">Annuler</button>
                <button onclick="confirmPosteAssignment()" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold text-white uppercase italic">Valider</button>
            </div>
        </div>
    </div>

    <script>
    
        const firebaseConfig = {
            apiKey: "AIzaSyB44m6DoeyQSNMctS0hKLpaPR5vNOTNsw0",
            authDomain: "concours-peche.firebaseapp.com",
            projectId: "concours-peche",
            appId: "1:376446532224:web:4f9c1ffd2f4fe3ef450465"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let state = {
            isLoggedIn: sessionStorage.getItem('auth_peche') === 'true',
            isAdmin: false,
            currentPage: 'index',
            currentPoste: null,
            currentType: null,
            fishermen: [],
            lastAdded: null,
            inscriptionType: 'carpo',
            resultatType: 'carpo',
            resultatTab: 'general',
            contestInfo: { title: 'Concours de Pêche', date: '2025', modeCarpo: 'individuel', modeFeeder: 'individuel' }
        };
        db.collection("data").doc("double-v3").onSnapshot(doc => {
            if(doc.exists) {
                const d = doc.data();
                state.fishermen = d.fishermen || [];
                state.contestInfo = d.contestInfo || state.contestInfo;
                render();
          
            }
        });
        const docRef = db.collection("data").doc("double-v3");

        // Transaction atomique : lit les données fraîches, applique la mutation, écrit
        const saveTx = async (mutationFn) => {
            try {
                await db.runTransaction(async (transaction) => {
                    const doc = await transaction.get(docRef);
                    const data = doc.exists ? doc.data() : { fishermen: [], contestInfo: state.contestInfo };
                    const fishermen = data.fishermen || [];
                    const contestInfo = data.contestInfo || state.contestInfo;
                    const result = mutationFn(fishermen, contestInfo);
                    transaction.set(docRef, { 
                        fishermen: result.fishermen !== undefined ? result.fishermen : fishermen, 
                        contestInfo: result.contestInfo !== undefined ? result.contestInfo : contestInfo 
                    });
                });
            } catch(e) {
                console.error("Transaction échouée:", e);
                alert("Erreur de synchronisation, rechargez la page.");
            }
        };

        // Fallback simple pour settings/reset
        const save = async () => {
            await docRef.set({ 
                fishermen: state.fishermen, 
                contestInfo: state.contestInfo 
            });
        };

        window.login = () => {
            const id = document.getElementById('l_id').value;
            const mdp = document.getElementById('l_mdp').value;
            if(id === "aappma" && mdp === "911") {
                state.isLoggedIn = true;
                sessionStorage.setItem('auth_peche', 'true'); render();
            } else { alert("Erreur identifiants"); }
        };
        window.logout = () => {
            state.isLoggedIn = false;
            state.isAdmin = false;
            sessionStorage.removeItem('auth_peche'); render();
        };

        window.checkAdmin = () => {
            const p = prompt("Mot de passe admin :");
            if(p === "admin") { state.isAdmin = true; nav('settings'); }
            else { alert("Accès refusé");
            }
        };

        const calc = {
            totalWeight: (f) => (f.weights || []).reduce((s, w) => s + w.weight, 0),
            periodWeight: (f, p) => (f.weights || []).filter(w => w.period === p).reduce((s, w) => s + w.weight, 0),
            fishCount: (f) => (f.weights || []).reduce((s, w) => s + (w.fishCount || 0), 0),
            
            globalWeight: (type) => state.fishermen.filter(f => f.type === type).reduce((acc, f) => acc + calc.totalWeight(f), 0),
            globalFish: (type) => state.fishermen.filter(f => f.type === type).reduce((acc, f) => acc + calc.fishCount(f), 0),
            record: (type) => {
                let best = { w: 0, n: '---', p: '' };
                state.fishermen.filter(f => f.type === type).forEach(f => {
                    (f.weights || []).forEach(w => {
                        if(w.fishCount === 1 && w.weight > best.w) {
                            best = { w: w.weight, n: f.nom, p: f.prenom };
  
                        }
                    });
                });
                return best;
            }
        };

        // Helpers mode Américaine
        const isAme = (type) => {
            const ci = state.contestInfo;
            if(type === 'carpo') return (ci.modeCarpo || 'individuel') === 'americaine';
            if(type === 'feeder') return (ci.modeFeeder || 'individuel') === 'americaine';
            return false;
        };
        const dName = (f) => isAme(f.type) && f.nom2 ? `${f.nom} ${f.prenom} & ${f.nom2} ${f.prenom2}` : `${f.nom} ${f.prenom}`;
        const dNameShort = (f) => isAme(f.type) && f.nom2 ? `${f.nom}<br>${f.nom2}` : `${f.nom}<br><span class="opacity-60 text-[8px] italic">${f.prenom}</span>`;
        const dNameResult = (f) => isAme(f.type) && f.nom2
            ? `<div class="font-black text-blue-900 uppercase text-xs md:text-base leading-none italic">${f.nom} ${f.prenom}</div><div class="text-[9px] font-bold text-slate-400 mt-0.5 uppercase italic">${f.nom2} ${f.prenom2}</div>`
            : `<div class="font-black text-blue-900 uppercase text-xs md:text-base leading-none italic">${f.nom}</div><div class="text-[9px] font-bold text-slate-400 mt-0.5 uppercase italic">${f.prenom}</div>`;

        window.nav = (p) => { state.currentPage = p; render();
        };

        function render() {
            const root = document.getElementById('app');
            if(!state.isLoggedIn) {
                root.innerHTML = `<div class="min-h-[60vh] flex items-center justify-center"><div class="bg-white p-10 rounded-[2.5rem] shadow-xl w-full max-sm mx-4 border text-center">
                <h2 class="text-2xl font-black mb-6 text-blue-900 uppercase italic">Connexion</h2>
                <input id="l_id" value="aappma" placeholder="IDENTIFIANT" class="w-full p-4 border rounded-2xl mb-4 font-bold bg-slate-50 uppercase outline-none"><input id="l_mdp" type="password" placeholder="MOT DE PASSE" class="w-full p-4 border rounded-2xl mb-6 font-bold bg-slate-50 outline-none">
      
                <button onclick="login()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase italic">Entrer</button></div></div>`;
                return;
            }

            if(state.currentPage === 'index') {
                root.innerHTML = `
                    <div class="flex justify-between items-center mb-8">
                        <button onclick="checkAdmin()" class="p-3 bg-white border rounded-full text-blue-600 shadow-sm hover:bg-blue-50 transition-colors"><i data-lucide="settings"></i></button>
        
                        <button onclick="logout()" class="p-3 bg-red-50 border border-red-100 rounded-full text-red-600 shadow-sm hover:bg-red-100 transition-colors"><i data-lucide="log-out"></i></button>
                    </div>
                    <div class="text-center mb-12">
                        <h1 class="text-5xl font-black text-blue-900 uppercase italic tracking-tighter">${state.contestInfo.title}</h1>
 
                        <div class="inline-block px-8 py-3 bg-blue-600 text-white rounded-full font-bold uppercase text-xs mt-3 shadow-lg">${state.contestInfo.date}</div>
                    </div>
                    <div class="grid grid-cols-2 gap-6 mb-8 max-w-3xl mx-auto">
                        <button onclick="navPesee('carpo')" class="p-8 bg-blue-900 text-white rounded-[2.5rem] shadow-xl font-black text-2xl flex flex-col items-center justify-center gap-2 hover:scale-95 transition-transform italic">
                            <i data-lucide="fish"></i> Carpodrome
                            ${isAme('carpo') ? '<span class="text-[10px] bg-orange-500 px-2 py-0.5 rounded-full normal-case not-italic">Américaine</span>' : ''}
                            <span class="text-xs font-bold opacity-60 normal-case not-italic">${state.fishermen.filter(f=>f.poste&&f.type==='carpo').length}/14 postes</span>
                        </button>
                        <button onclick="navPesee('feeder')" class="p-8 bg-slate-700 text-white rounded-[2.5rem] shadow-xl font-black text-2xl flex flex-col items-center justify-center gap-2 hover:scale-95 transition-transform italic">
                            <i data-lucide="fish"></i> Feeder
                            ${isAme('feeder') ? '<span class="text-[10px] bg-orange-500 px-2 py-0.5 rounded-full normal-case not-italic">Américaine</span>' : ''}
                            <span class="text-xs font-bold opacity-60 normal-case not-italic">${state.fishermen.filter(f=>f.poste&&f.type==='feeder').length}/10 postes</span>
                        </button>
                    </div>
                    <div class="grid grid-cols-2 gap-6 max-w-3xl mx-auto">
                        <button onclick="nav('inscription')" class="p-8 bg-orange-500 text-white rounded-[2.5rem] shadow-xl font-black text-2xl flex items-center justify-center gap-3 hover:scale-95 transition-transform italic"><i data-lucide="users"></i> Inscriptions</button>
                        <button onclick="nav('resultats')" class="p-8 bg-emerald-600 text-white rounded-[2.5rem] shadow-xl font-black text-2xl flex items-center justify-center gap-3 hover:scale-95 transition-transform italic"><i data-lucide="trophy"></i> Classement</button>
                    </div>
                `;
            }
            else if(state.currentPage === 'pesee') renderPesee(root); 
            else if(state.currentPage === 'inscription') renderInscription(root);
            else if(state.currentPage === 'resultats') renderResultats(root);
            else if(state.currentPage === 'poste') renderPoste(root);
            else if(state.currentPage === 'settings') renderSettings(root);
            lucide.createIcons();
        }

        function renderGrid(count, type) {
            return Array.from({length: count}, (_, i) => i + 1).map(n => {
                const f = state.fishermen.find(x => x.poste == n && x.type === type);
                return `
                <button onclick="${f ? `window.openP(${n}, '${type}')` : ''}" 
                class="p-5 rounded-3xl border-2 transition-all flex flex-col items-center ${f ? 'bg-blue-900 border-blue-900 text-white shadow-xl' : 'bg-white border-white text-blue-800 opacity-80'}">
                    <span class="text-[10px] font-black uppercase opacity-50">Poste</span><span class="text-3xl font-black mb-1 italic">${n}</span>
                    <span class="text-[9px] font-bold uppercase truncate w-full text-center leading-tight">${f ? dNameShort(f) : 'LIBRE'}</span>
                </button>`;
     
            }).join('');
        }

        window.openP = (n, type) => { state.currentPoste = n;
        state.currentType = type; nav('poste'); };

        window.navPesee = (type) => { state.currentType = type; state.currentPage = 'pesee'; render(); };

        function renderPesee(container) {
            const type = state.currentType;
            const label = type === 'carpo' ? 'Carpodrome' : 'Feeder';
            const max = type === 'carpo' ? 14 : 10;
            const cols = type === 'carpo' ? 'grid-cols-2 sm:grid-cols-4 md:grid-cols-7' : 'grid-cols-2 sm:grid-cols-4 md:grid-cols-5';
            const totalPoids = calc.globalWeight(type).toFixed(3);
            const totalPoissons = calc.globalFish(type);
            container.innerHTML = `
                <button onclick="nav('index')" class="mb-8 flex items-center text-blue-600 font-bold underline italic"><i data-lucide="arrow-left" class="mr-2"></i> Retour Accueil</button>
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-black text-blue-900 uppercase italic">${label}</h2>
                    <div class="flex justify-center gap-6 mt-3">
                        <span class="bg-blue-100 text-blue-800 px-4 py-2 rounded-full font-bold text-sm">${totalPoids} kg</span>
                        <span class="bg-emerald-100 text-emerald-800 px-4 py-2 rounded-full font-bold text-sm">${totalPoissons} poisson(s)</span>
                    </div>
                </div>
                <div class="grid ${cols} gap-4">${renderGrid(max, type)}</div>
            `;
        }

        function renderResultats(container) {
            const type = state.resultatType;
            const tab = state.resultatTab;
            const label = type === 'carpo' ? 'Carpodrome' : 'Feeder';
            
            const periodFish = (f, p) => (f.weights || []).filter(w => w.period === p).reduce((s, w) => s + (w.fishCount || 0), 0);

            // Sort by selected period or total
            let sorted;
            if(tab === 'matin') {
                sorted = [...state.fishermen].filter(f => f.poste && f.type === type).sort((a,b) => calc.periodWeight(b, 'matin') - calc.periodWeight(a, 'matin'));
            } else if(tab === 'apres-midi') {
                sorted = [...state.fishermen].filter(f => f.poste && f.type === type).sort((a,b) => calc.periodWeight(b, 'apres-midi') - calc.periodWeight(a, 'apres-midi'));
            } else {
                sorted = [...state.fishermen].filter(f => f.poste && f.type === type).sort((a,b) => calc.totalWeight(b) - calc.totalWeight(a));
            }
            
            const rec = (() => {
                let best = { w: 0, n: '---', p: '' };
                const fishers = state.fishermen.filter(f => f.poste && f.type === type);
                fishers.forEach(f => {
                    const ws = tab === 'general' ? (f.weights || []) : (f.weights || []).filter(w => w.period === tab);
                    ws.forEach(w => {
                        if(w.fishCount === 1 && w.weight > best.w) best = { w: w.weight, n: f.nom, p: f.prenom };
                    });
                });
                return best;
            })();
            const statPoids = (() => {
                const fishers = state.fishermen.filter(f => f.poste && f.type === type);
                if(tab === 'general') return calc.globalWeight(type);
                return fishers.reduce((s, f) => s + calc.periodWeight(f, tab), 0);
            })();
            const statPoissons = (() => {
                const fishers = state.fishermen.filter(f => f.poste && f.type === type);
                if(tab === 'general') return calc.globalFish(type);
                return fishers.reduce((s, f) => s + (f.weights || []).filter(w => w.period === tab).reduce((a, w) => a + (w.fishCount || 0), 0), 0);
            })();
            const tabBtn = (id, lbl) => `<button onclick="setResultatTab('${id}')" class="px-6 py-3 rounded-2xl font-black uppercase text-sm italic transition-all ${tab === id ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-blue-800 border hover:bg-blue-50'}">${lbl}</button>`;
            const typeBtn = (id, lbl) => `<button onclick="setResultatType('${id}')" class="px-6 py-3 rounded-2xl font-black uppercase text-sm italic transition-all ${type === id ? 'bg-blue-900 text-white shadow-lg' : 'bg-white text-blue-800 border hover:bg-blue-50'}">${lbl}</button>`;

            // Build table based on tab
            // Compute ex-aequo ranks
            const getWeight = (f) => tab === 'general' ? calc.totalWeight(f) : calc.periodWeight(f, tab);
            const ranks = [];
            sorted.forEach((f, i) => {
                if(i === 0) ranks.push(1);
                else ranks.push(getWeight(sorted[i]).toFixed(3) === getWeight(sorted[i-1]).toFixed(3) ? ranks[i-1] : i + 1);
            });
            const rankClass = (r) => r===1?'bg-yellow-400 text-white shadow-lg':r===2?'bg-slate-300 text-white':r===3?'bg-orange-400 text-white':'bg-slate-100 text-slate-400';

            let tableHead, tableRows;
            if(tab === 'general') {
                tableHead = `
                    <tr><th class="p-2 md:p-3">Rang</th><th class="p-2 md:p-3">Poste</th><th class="p-2 md:p-3">Identité</th><th class="p-2 md:p-3">Poissons</th><th class="p-2 md:p-3">Matin</th><th class="p-2 md:p-3">Après-midi</th><th class="p-2 md:p-3 text-right">Total</th></tr>`;
                tableRows = sorted.map((f, i) => `
                    <tr class="border-b border-slate-50 last:border-0 hover:bg-blue-50/50">
                        <td class="p-2 md:p-3"><span class="w-8 h-8 md:w-10 md:h-10 flex items-center justify-center rounded-xl font-black text-sm md:text-lg ${rankClass(ranks[i])}">${ranks[i]}</span></td>
                        <td class="p-2 md:p-3 font-black text-blue-600 text-lg italic">${f.poste}</td>
                        <td class="p-2 md:p-3">${dNameResult(f)}</td>
                        <td class="p-2 md:p-3 font-bold text-emerald-600 text-sm">${calc.fishCount(f)}</td>
                        <td class="p-2 md:p-3 font-bold text-slate-500 text-xs md:text-sm">${calc.periodWeight(f, 'matin').toFixed(3)} kg</td>
                        <td class="p-2 md:p-3 font-bold text-slate-500 text-xs md:text-sm">${calc.periodWeight(f, 'apres-midi').toFixed(3)} kg</td>
                        <td class="p-2 md:p-3 text-right font-black text-base md:text-xl text-blue-900">${calc.totalWeight(f).toFixed(3)} kg</td>
                    </tr>`).join('');
            } else {
                const period = tab;
                const periodLabel = tab === 'matin' ? 'Matin' : 'Après-midi';
                tableHead = `
                    <tr><th class="p-2 md:p-3">Rang</th><th class="p-2 md:p-3">Poste</th><th class="p-2 md:p-3">Identité</th><th class="p-2 md:p-3">Poissons</th><th class="p-2 md:p-3 text-right">Poids ${periodLabel}</th></tr>`;
                tableRows = sorted.map((f, i) => `
                    <tr class="border-b border-slate-50 last:border-0 hover:bg-blue-50/50">
                        <td class="p-2 md:p-3"><span class="w-8 h-8 md:w-10 md:h-10 flex items-center justify-center rounded-xl font-black text-sm md:text-lg ${rankClass(ranks[i])}">${ranks[i]}</span></td>
                        <td class="p-2 md:p-3 font-black text-blue-600 text-lg italic">${f.poste}</td>
                        <td class="p-2 md:p-3">${dNameResult(f)}</td>
                        <td class="p-2 md:p-3 font-bold text-emerald-600 text-sm">${periodFish(f, period)}</td>
                        <td class="p-2 md:p-3 text-right font-black text-base md:text-xl text-blue-900">${calc.periodWeight(f, period).toFixed(3)} kg</td>
                    </tr>`).join('');
            }

            container.innerHTML = `
                <button onclick="nav('index')" class="mb-8 flex items-center text-blue-600 font-bold underline italic"><i data-lucide="arrow-left" class="mr-2"></i> Retour Accueil</button>
                
                <div class="flex justify-center gap-3 mb-6">${typeBtn('carpo','Carpodrome')}${typeBtn('feeder','Feeder')}</div>

                <div class="flex justify-center items-center gap-3 mb-6">
                    ${tabBtn('matin','Matin')}${tabBtn('apres-midi','Après-midi')}${tabBtn('general','Général')}
                    <button onclick="printResultats()" class="p-3 bg-white border rounded-2xl text-blue-600 hover:bg-blue-50 transition-colors shadow-sm ml-2"><i data-lucide="printer" class="w-5 h-5"></i></button>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                    <div class="bg-blue-900 p-6 rounded-[2.5rem] text-white shadow-xl">
                        <p class="text-xs font-black uppercase mb-1 opacity-60 italic">Poids ${tab === 'general' ? 'Total' : tab === 'matin' ? 'Matin' : 'Après-midi'}</p>
                        <p class="text-3xl font-black">${statPoids.toFixed(3)} kg</p>
                    </div>
                    <div class="bg-blue-600 p-6 rounded-[2.5rem] text-white shadow-xl">
                        <p class="text-xs font-black uppercase mb-1 opacity-60 italic">Poissons Sortis</p>
                        <p class="text-3xl font-black">${statPoissons}</p>
                    </div>
                    <div class="bg-yellow-500 p-6 rounded-[2.5rem] text-blue-900 shadow-xl">
                        <p class="text-xs font-black uppercase mb-1 opacity-60 italic">Plus Grosse Prise</p>
                        <p class="text-2xl font-black">${rec.w.toFixed(3)} kg</p>
                        <p class="text-[10px] font-black uppercase italic mt-1 leading-tight">${rec.n} ${rec.p}</p>
                    </div>
                </div>

                <div id="print-zone">
                <div class="bg-white rounded-[2.5rem] shadow-xl border overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-blue-900 text-white text-[10px] uppercase font-black tracking-widest whitespace-nowrap">
                            ${tableHead}
                        </thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                </div>
                </div>
            `;
        }

        window.setResultatType = (t) => { state.resultatType = t; render(); };
        window.setResultatTab = (t) => { state.resultatTab = t; render(); };

        window.printResultats = () => {
            const type = state.resultatType;
            const typeLabel = type === 'carpo' ? 'Carpodrome' : 'Feeder';
            const tabLabels = { general: 'Général', matin: 'Matin', 'apres-midi': 'Après-midi' };
            const tabLabel = tabLabels[state.resultatTab];
            const tableHTML = document.getElementById('print-zone').innerHTML;
            const tab = state.resultatTab;
            const fishers = state.fishermen.filter(f => f.poste && f.type === type);

            let totalPoids, totalPoissons, rec;
            if(tab === 'general') {
                totalPoids = calc.globalWeight(type).toFixed(3);
                totalPoissons = calc.globalFish(type);
                rec = calc.record(type);
            } else {
                totalPoids = fishers.reduce((s, f) => s + calc.periodWeight(f, tab), 0).toFixed(3);
                totalPoissons = fishers.reduce((s, f) => s + (f.weights || []).filter(w => w.period === tab).reduce((a, w) => a + (w.fishCount || 0), 0), 0);
                rec = { w: 0, n: '---', p: '' };
                fishers.forEach(f => {
                    (f.weights || []).filter(w => w.period === tab).forEach(w => {
                        if(w.fishCount === 1 && w.weight > rec.w) {
                            rec = { w: w.weight, n: f.nom, p: isAme(f.type) && f.nom2 ? f.prenom + ' & ' + f.nom2 + ' ' + f.prenom2 : f.prenom };
                        }
                    });
                });
            }

            const w = window.open('', '_blank');
            w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Classement ${typeLabel} - ${tabLabel}</title>
            <style>
                body { font-family: Arial, sans-serif; padding: 20px; color: #1e3a8a; }
                h1 { text-align: center; font-size: 22px; margin-bottom: 4px; color: #1e3a8a; }
                h2 { text-align: center; font-size: 14px; color: #3b82f6; margin-bottom: 20px; font-style: italic; }
                table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
                th { background: #1e3a8a; color: white; padding: 8px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
                td { padding: 6px 8px; border-bottom: 1px solid #e2e8f0; font-size: 13px; }
                tr:nth-child(even) { background: transparent; }
                tbody tr:first-child td { background: #fef9c3; }
                tbody tr:nth-child(2) td { background: #e8e8e8; }
                tbody tr:nth-child(3) td { background: #fed7aa; }
                .footer { display: flex; justify-content: space-between; margin-top: 20px; padding: 12px 15px; border-top: 2px solid #1e3a8a; font-weight: bold; font-size: 13px; color: #1e3a8a; }
                .footer-item { text-align: center; }
                .footer-label { font-size: 10px; text-transform: uppercase; color: #64748b; letter-spacing: 1px; }
                .footer-value { font-size: 18px; margin-top: 2px; color: #1e3a8a; }
                .shadow-xl, .shadow-lg, .shadow-sm, .shadow-inner { box-shadow: none !important; }
                [class*="rounded-"] { border-radius: 0 !important; }
                @media print { body { padding: 10px; } th, tbody tr:first-child td, tbody tr:nth-child(2) td, tbody tr:nth-child(3) td { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
            </style></head><body>
            <h1>${state.contestInfo.title} — ${typeLabel}</h1>
            <h2>Classement ${tabLabel} — ${state.contestInfo.date}</h2>
            ${tableHTML}
            <div class="footer">
                <div class="footer-item"><div class="footer-label">Poissons sortis</div><div class="footer-value">${totalPoissons}</div></div>
                <div class="footer-item"><div class="footer-label">Poids total</div><div class="footer-value">${totalPoids} kg</div></div>
                <div class="footer-item"><div class="footer-label">Plus grosse prise</div><div class="footer-value">${rec.w.toFixed(3)} kg</div><div class="footer-label" style="margin-top:2px">${rec.n} ${rec.p}</div></div>
            </div>
            </body></html>`);
            w.document.close();
            w.setTimeout(() => { w.print(); }, 300);
        };

        function renderSettings(container) {
            container.innerHTML = `
                <button onclick="nav('index')" class="mb-8 flex items-center text-blue-600 font-bold underline italic"><i data-lucide="arrow-left" class="mr-2"></i> Retour</button>
                <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border max-w-lg mx-auto">
                    <h2 class="text-2xl font-black text-blue-900 mb-8 uppercase italic">Paramètres Admin</h2>
                    <div class="space-y-6">
                        <div><label class="text-[10px] font-black uppercase text-slate-400 ml-2">Titre du Concours</label><input id="set_title" value="${state.contestInfo.title}" class="w-full p-4 border rounded-2xl font-bold bg-slate-50 outline-none"></div>
                        <div><label class="text-[10px] font-black uppercase text-slate-400 ml-2">Sous-titre / Date</label><input id="set_date" value="${state.contestInfo.date}" class="w-full p-4 border rounded-2xl font-bold bg-slate-50 outline-none"></div>
                        <div><label class="text-[10px] font-black uppercase text-slate-400 ml-2">Mode Carpodrome</label>
                            <select id="set_modeCarpo" class="w-full p-4 border rounded-2xl font-bold bg-slate-50 outline-none">
                                <option value="individuel" ${(state.contestInfo.modeCarpo || 'individuel') === 'individuel' ? 'selected' : ''}>Individuel (1 pêcheur / poste)</option>
                                <option value="americaine" ${state.contestInfo.modeCarpo === 'americaine' ? 'selected' : ''}>Américaine (2 pêcheurs / poste)</option>
                            </select>
                        </div>
                        <div><label class="text-[10px] font-black uppercase text-slate-400 ml-2">Mode Feeder</label>
                            <select id="set_modeFeeder" class="w-full p-4 border rounded-2xl font-bold bg-slate-50 outline-none">
                                <option value="individuel" ${(state.contestInfo.modeFeeder || 'individuel') === 'individuel' ? 'selected' : ''}>Individuel (1 pêcheur / poste)</option>
                                <option value="americaine" ${state.contestInfo.modeFeeder === 'americaine' ? 'selected' : ''}>Américaine (2 pêcheurs / poste)</option>
                            </select>
                        </div>
                        <button onclick="updateSet()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-xl uppercase italic">Enregistrer</button>
                        <button onclick="resetAll()" class="w-full bg-red-50 text-red-600 font-bold py-4 rounded-2xl mt-4 italic">Réinitialiser les données (⚠️)</button>
                    </div>
                </div>`;
        }

        window.updateSet = () => {
            const title = document.getElementById('set_title').value;
            const date = document.getElementById('set_date').value;
            const modeCarpo = document.getElementById('set_modeCarpo').value;
            const modeFeeder = document.getElementById('set_modeFeeder').value;
            saveTx((fishermen, contestInfo) => {
                return { contestInfo: { title, date, modeCarpo, modeFeeder } };
            });
            nav('index');
        };

        window.resetAll = () => { if(confirm("Vider toutes les données du concours ? Cette action est irréversible.")) {
            saveTx(() => {
                return { fishermen: [] };
            });
            nav('index'); } };

        function renderInscription(container) {
            const hasUndo = state.lastAdded !== null;
            const ameType = isAme(state.inscriptionType);
            container.innerHTML = `
                <button onclick="nav('index')" class="mb-8 flex items-center text-blue-600 font-bold underline italic"><i data-lucide="arrow-left" class="mr-2"></i> Retour Accueil</button>
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border mb-10">
                    <h2 class="text-2xl font-black text-blue-900 uppercase mb-6 italic">Enregistrement ${ameType ? '(Binôme)' : ''}</h2>
    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <input id="in_nom" placeholder="NOM ${ameType ? 'Pêcheur 1' : ''}" class="p-4 border-2 border-slate-100 rounded-2xl font-bold uppercase bg-slate-50 outline-none focus:border-blue-600">
                        <input id="in_prenom" placeholder="Prénom ${ameType ? 'Pêcheur 1' : ''}" class="p-4 border-2 border-slate-100 rounded-2xl font-bold bg-slate-50 outline-none focus:border-blue-600">
                    </div>
                    ${ameType ? `<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <input id="in_nom2" placeholder="NOM Pêcheur 2" class="p-4 border-2 border-slate-100 rounded-2xl font-bold uppercase bg-slate-50 outline-none focus:border-blue-600">
                        <input id="in_prenom2" placeholder="Prénom Pêcheur 2" class="p-4 border-2 border-slate-100 rounded-2xl font-bold bg-slate-50 outline-none focus:border-blue-600">
                    </div>` : ''}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <select id="in_type" onchange="onTypeChange()" class="p-4 border-2 border-slate-100 rounded-2xl font-bold bg-slate-50 uppercase outline-none"><option value="carpo" ${state.inscriptionType === 'carpo' ? 'selected' : ''}>Carpodrome</option><option value="feeder" ${state.inscriptionType === 'feeder' ? 'selected' : ''}>Feeder</option></select>
                        <select id="in_poste" class="p-4 border-2 border-slate-100 rounded-2xl font-bold bg-slate-50 uppercase outline-none"><option value="">-- Attente --</option></select>
                    </div>
                 
                    <div class="flex gap-3">
                        <button onclick="addF()" class="flex-1 bg-blue-900 text-white font-black py-5 rounded-2xl shadow-xl uppercase italic">${ameType ? 'Inscrire le binôme' : 'Inscrire le pêcheur'}</button>
                        ${hasUndo ? `<button onclick="undoLastAdd()" class="bg-orange-500 hover:bg-orange-600 text-white font-black py-5 px-8 rounded-2xl shadow-xl uppercase italic flex items-center gap-2 transition-colors"><i data-lucide="undo-2" class="w-5 h-5"></i> Annuler</button>` : ''}
                    </div>
                    ${hasUndo ? `<div class="mt-3 bg-orange-50 border border-orange-200 rounded-2xl px-5 py-3 flex items-center gap-3">
                        <i data-lucide="info" class="w-4 h-4 text-orange-500 shrink-0"></i>
                        <span class="text-orange-700 font-bold text-sm italic">Dernière inscription : <span class="uppercase">${state.lastAdded.nom}</span> ${state.lastAdded.prenom}${state.lastAdded.nom2 ? ' & ' + state.lastAdded.nom2 + ' ' + state.lastAdded.prenom2 : ''} (${state.lastAdded.type === 'carpo' ? 'Carpodrome' : 'Feeder'}${state.lastAdded.poste ? ' — Poste ' + state.lastAdded.poste : ' — Attente'})</span>
                    </div>` : ''}
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div><h3 class="font-black text-blue-900 uppercase mb-4 bg-blue-50 p-4 rounded-xl text-xs italic tracking-widest">Assignés Carpodrome ${isAme('carpo') ? '(Américaine)' : ''}</h3><div class="space-y-3">${renderAss('carpo')}</div><div class="mt-8 space-y-2">${renderWait('carpo')}</div></div>
               
                    <div><h3 class="font-black text-slate-700 uppercase mb-4 bg-slate-100 p-4 rounded-xl text-xs italic tracking-widest">Assignés Feeder ${isAme('feeder') ? '(Américaine)' : ''}</h3><div class="space-y-3">${renderAss('feeder')}</div><div class="mt-8 space-y-2">${renderWait('feeder')}</div></div>
                </div>`;
            updatePL();
        }

        window.onTypeChange = () => {
            state.inscriptionType = document.getElementById('in_type').value;
            renderInscription(document.getElementById('app'));
            lucide.createIcons();
        };
        window.updatePL = () => {
            const t = state.inscriptionType;
            const sel = document.getElementById('in_poste');
            const max = t === 'carpo' ? 14 : 10;
            sel.innerHTML = '<option value="">-- Attente --</option>';
            for(let i=1; i<=max; i++) if(!state.fishermen.find(f => f.poste == i && f.type === t)) sel.innerHTML += `<option value="${i}">Poste ${i}</option>`;
        };
        window.addF = () => {
            const nom = document.getElementById('in_nom').value.toUpperCase();
            const prenom = document.getElementById('in_prenom').value;
            const type = state.inscriptionType;
            const poste = document.getElementById('in_poste').value;
            if(!nom || !prenom) return;
            const newFisher = { nom, prenom, type, poste: poste ? parseInt(poste) : null, weights: [] };
            if(isAme(type)) {
                const nom2 = document.getElementById('in_nom2').value.toUpperCase();
                const prenom2 = document.getElementById('in_prenom2').value;
                if(!nom2 || !prenom2) return alert("Veuillez remplir le nom et prénom du 2ème pêcheur");
                newFisher.nom2 = nom2;
                newFisher.prenom2 = prenom2;
            }
            state.lastAdded = { ...newFisher };
            saveTx((fishermen) => {
                fishermen.push(newFisher);
                return { fishermen };
            });
        };

        window.undoLastAdd = () => {
            if(!state.lastAdded) return;
            const la = state.lastAdded;
            saveTx((fishermen) => {
                const idx = fishermen.findIndex(f => 
                    f.nom === la.nom && f.prenom === la.prenom && f.type === la.type && f.poste === la.poste
                );
                if(idx !== -1) fishermen.splice(idx, 1);
                return { fishermen };
            });
            state.lastAdded = null;
        };

        function renderAss(t) {
            return state.fishermen.filter(f => f.poste && f.type === t).sort((a,b) => a.poste - b.poste).map(f => `
                <div class="bg-white p-5 rounded-3xl border flex justify-between items-center shadow-sm">
                    <div><div class="text-blue-600 font-black text-xs uppercase italic leading-none">Poste ${f.poste}</div><div class="font-black text-blue-900 uppercase text-lg italic">${dName(f)}</div></div>
                
                    <button onclick="delF(${f.poste}, '${t}')" class="text-red-100 hover:text-red-500 transition-colors"><i data-lucide="trash-2"></i></button>
                </div>`).join('');
        }

        function renderWait(t) {
            return state.fishermen.filter(f => !f.poste && f.type === t).map(f => `
                <div class="bg-white p-4 rounded-2xl border-2 border-dashed border-slate-200 flex justify-between items-center gap-2">
                    <div class="font-black text-blue-900 uppercase text-sm italic">${dName(f)}</div>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="openM('${f.nom} ${f.prenom}', '${t}')" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase italic">Assigner</button>
                        <button onclick="delWait('${f.nom}', '${f.prenom}', '${t}')" class="bg-red-50 text-red-400 hover:text-red-600 hover:bg-red-100 p-2 rounded-xl transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>`).join('');
        }

        window.delF = (p, t) => { if(confirm("Supprimer ce pêcheur ?")) {
            state.lastAdded = null;
            saveTx((fishermen) => {
                return { fishermen: fishermen.filter(f => !(f.poste == p && f.type === t)) };
            });
        } };

        window.delWait = (nom, prenom, t) => { if(confirm("Supprimer ce pêcheur ?")) {
            state.lastAdded = null;
            saveTx((fishermen) => {
                const idx = fishermen.findIndex(f => f.nom === nom && f.prenom === prenom && f.type === t && !f.poste);
                if(idx !== -1) fishermen.splice(idx, 1);
                return { fishermen };
            });
        } };

        window.openM = (n, t) => {
            state.targetFisherIndex = state.fishermen.findIndex(f => `${f.nom} ${f.prenom}` === n && f.type === t);
            state.currentType = t;
            const tf = state.fishermen[state.targetFisherIndex];
            document.getElementById('modal-fisher-name').innerText = tf ? dName(tf) : n;
            const sel = document.getElementById('modal-select-poste');
            sel.innerHTML = '<option value="">Poste...</option>';
            const max = t === 'carpo' ? 14 : 10;
            for(let i=1; i<=max; i++) if(!state.fishermen.find(f => f.poste == i && f.type === t)) sel.innerHTML += `<option value="${i}">Poste ${i}</option>`;
            document.getElementById('modal-poste').classList.remove('hidden');
        };
        window.confirmPosteAssignment = () => {
            const p = document.getElementById('modal-select-poste').value;
            if(!p) return;
            const targetFisher = state.fishermen[state.targetFisherIndex];
            const nom = targetFisher.nom;
            const prenom = targetFisher.prenom;
            const type = state.currentType;
            saveTx((fishermen) => {
                const f = fishermen.find(f => f.nom === nom && f.prenom === prenom && f.type === type);
                if(f) f.poste = parseInt(p);
                return { fishermen };
            });
            document.getElementById('modal-poste').classList.add('hidden');
        };

        window.closePosteModal = () => document.getElementById('modal-poste').classList.add('hidden');
        function renderPoste(container) {
            const f = state.fishermen.find(f => f.poste == state.currentPoste && f.type === state.currentType);
            if(!f) return nav('index');
            container.innerHTML = `
                <button onclick="nav('index')" class="mb-8 flex items-center text-blue-600 font-bold underline italic"><i data-lucide="arrow-left" class="mr-2"></i> Retour</button>
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border-l-8 border-blue-600 mb-6 flex justify-between items-end">
                    <div><h1 class="text-4xl font-black text-blue-900 uppercase italic">Poste ${state.currentPoste}</h1><p class="text-2xl font-bold text-slate-400 uppercase leading-none italic">${dName(f)}</p></div>
         
                    <div class="bg-blue-50 p-6 rounded-[2rem] text-right border border-blue-100 shadow-inner">
                        <span class="text-4xl font-black text-blue-800">${calc.totalWeight(f).toFixed(3)}<span class="text-lg ml-1">kg</span></span>
                    </div>
                </div>
                <div 
                class="bg-white p-8 rounded-[2.5rem] shadow-sm border mb-8 grid grid-cols-1 sm:grid-cols-4 gap-4">
                    <select id="p_per" class="p-4 border-2 border-slate-100 rounded-2xl font-bold bg-slate-50 uppercase outline-none"><option value="matin">Matin</option><option value="apres-midi">Après-midi</option></select>
                    <input id="p_wei" type="number" step="0.001" placeholder="Poids (kg)" class="p-4 border-2 border-slate-100 rounded-2xl font-bold bg-slate-50 outline-none">
                    <input id="p_cou" type="number" value="1" placeholder="Nb Poissons" class="p-4 border-2 
                    border-slate-100 rounded-2xl font-bold bg-slate-50 outline-none">
                    <button onclick="addW()" class="bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase italic tracking-widest">Valider</button>
                </div>
                <div class="bg-white rounded-[2.5rem] shadow-sm border overflow-hidden">
                    <table class="w-full text-left">
       
                        <thead class="bg-slate-50 text-slate-400 font-black uppercase text-[10px] tracking-widest">
                            <tr><th class="p-6">Période</th><th class="p-6">Nombre de Poissons</th><th class="p-6 text-right">Poids Pesé</th><th class="p-6"></th></tr>
                        </thead>
                 
                    <tbody>
                        ${(f.weights ||
                        []).slice().reverse().map((w, idx) => `
                            <tr class="border-t border-slate-50 hover:bg-slate-50/50">
                                <td class="p-6 font-bold text-blue-900 uppercase text-xs italic">${w.period}</td>
                            
                                <td class="p-6 font-bold text-blue-400 text-sm italic">${w.fishCount || 0} Poisson(s)</td>
                                <td class="p-6 text-right font-black text-blue-900 text-xl italic">${w.weight.toFixed(3)} kg</td>
                                <td class="p-6 flex justify-center gap-2">
             
                                    <button onclick="editW(${f.weights.length-1-idx})" class="p-2 text-blue-200 hover:text-blue-600 transition-colors"><i data-lucide="edit-3"></i></button>
                                    <button onclick="delW(${f.weights.length-1-idx})" class="p-2 text-red-100 hover:text-red-500 transition-colors"><i data-lucide="trash-2"></i></button>
                             
                                </td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        window.addW = () => {
            const w = parseFloat(document.getElementById('p_wei').value);
            const c = parseInt(document.getElementById('p_cou').value) || 0;
            if(!w) return;
            const period = document.getElementById('p_per').value;
            const poste = state.currentPoste;
            const type = state.currentType;
            saveTx((fishermen) => {
                const f = fishermen.find(f => f.poste == poste && f.type === type);
                if(f) {
                    if(!f.weights) f.weights = [];
                    f.weights.push({ period, weight: w, fishCount: c });
                }
                return { fishermen };
            });
            document.getElementById('p_wei').value = '';
            document.getElementById('p_cou').value = '1';
        };

        window.editW = (idx) => {
            const p = prompt("Modification réservée. Mot de passe admin :");
            if(p !== "admin") return alert("Accès refusé");
            
            const f = state.fishermen.find(f => f.poste == state.currentPoste && f.type === state.currentType);
            const w = f.weights[idx];
            
            document.getElementById('p_per').value = w.period;
            document.getElementById('p_wei').value = w.weight;
            document.getElementById('p_cou').value = w.fishCount;
            
            const poste = state.currentPoste;
            const type = state.currentType;
            saveTx((fishermen) => {
                const fi = fishermen.find(fi => fi.poste == poste && fi.type === type);
                if(fi && fi.weights) fi.weights.splice(idx, 1);
                return { fishermen };
            });
            alert("Les données ont été remontées dans le formulaire. Modifiez-les puis cliquez sur 'Valider'.");
        };
        window.delW = (idx) => {
            const p = prompt("Suppression réservée. Mot de passe admin :");
            if(p !== "admin") return alert("Accès refusé");
            const poste = state.currentPoste;
            const type = state.currentType;
            saveTx((fishermen) => {
                const f = fishermen.find(f => f.poste == poste && f.type === type);
                if(f && f.weights) f.weights.splice(idx, 1);
                return { fishermen };
            });
        };

        render();
    </script>
</body>
</html>
